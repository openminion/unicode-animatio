default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: commit-message-policy
        name: commit message policy
        entry: ./.venv/bin/python3.11 scripts/validate_commit_message.py
        language: system
        stages: [commit-msg]
      - id: unicode-animatio-quality-patterns
        name: unicode-animatio quality pattern ratchets
        entry: make validate-patterns
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-check
        name: ruff check --fix
        entry: ./.venv/bin/python3.11 -m ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: ./.venv/bin/python3.11 -m ruff format
        language: system
        types_or: [python, pyi]
